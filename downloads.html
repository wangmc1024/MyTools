<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下载中心 — MyTools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#635bff',
            primaryLight: '#7f74ff',
          },
        },
      },
    }
  </script>
  <style>
    :root, [data-theme="dark"] {
      --bg: #0a0e1a; --bg-card: rgba(255,255,255,0.06);
      --bg-card-hover: rgba(255,255,255,0.12);
      --text: #e8eaf0; --text-muted: #9ca3af;
      --border: rgba(255,255,255,0.08);
      --accent: rgba(99,91,255,0.12);
    }
    [data-theme="light"] {
      --bg: #f0f2f8; --bg-card: rgba(255,255,255,0.8);
      --bg-card-hover: rgba(99,91,255,0.06);
      --text: #1a1a2e; --text-muted: #666;
      --border: rgba(0,0,0,0.08);
      --accent: rgba(99,91,255,0.08);
    }
    body { background: var(--bg); color: var(--text); transition: background .3s, color .3s; }
    .nav-glass {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(17,24,39,.72) !important;
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .nav-glass { background: rgba(255,255,255,.72) !important; }

    /* ---- Download cards ---- */
    .dl-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex; align-items: center; gap: 18px;
      transition: all .3s ease;
    }
    .dl-card:hover {
      border-color: rgba(99,91,255,.3);
      background: var(--bg-card-hover);
      box-shadow: 0 8px 32px rgba(99,91,255,.1);
      transform: translateY(-2px);
    }
    .dl-icon {
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
      background: var(--accent);
      font-size: 26px;
      flex-shrink: 0;
    }
    .dl-info { flex: 1; min-width: 0; }
    .dl-info h3 { font-size: 15px; font-weight: 600; margin: 0 0 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dl-info p { font-size: 12px; color: var(--text-muted); margin: 0; }
    .dl-btn {
      padding: 10px 22px;
      border-radius: 12px;
      background: linear-gradient(135deg, #635bff, #7f74ff);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all .2s;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99,91,255,.3);
    }
    .dl-btn:hover { box-shadow: 0 4px 16px rgba(99,91,255,.45); transform: scale(1.03); }

    /* ---- Section headings ---- */
    .section-title {
      font-size: 16px; font-weight: 700; letter-spacing: .02em;
      color: var(--text);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; display: block;
      width: 4px; height: 16px;
      border-radius: 2px;
      background: linear-gradient(180deg, #635bff, #7f74ff);
    }

    /* ---- Content switcher ---- */
    .switch-bar {
      display: inline-flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      gap: 2px;
      margin-bottom: 24px;
    }
    .switch-btn {
      padding: 9px 28px;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all .25s ease;
    }
    .switch-btn:hover { color: var(--text); background: var(--bg-card-hover); }
    .switch-btn.active {
      background: #635bff;
      color: #fff;
      box-shadow: 0 2px 12px rgba(99,91,255,.35);
    }
    .switch-panel { display: none; }
    .switch-panel.active { display: block; animation: fadeSlideIn .3s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ---- Repo tree (file explorer style) ---- */
    .repo-container {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--bg-card);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
    }
    .repo-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      cursor: default;
      user-select: none;
      line-height: 1.5;
    }
    .repo-row:last-child { border-bottom: none; }
    .repo-row.file { cursor: pointer; }
    .repo-row.file:hover { background: var(--bg-card-hover); }
    .repo-row.folder { cursor: pointer; }
    .repo-row.folder:hover { color: #635bff; }
    .repo-row .count {
      font-size: 11px;
      color: var(--text-muted);
      opacity: .6;
      margin-left: auto;
    }
    .tree-arrow {
      display: inline-block;
      font-size: 11px;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
      opacity: .5;
      transition: transform .2s ease;
    }
    .tree-arrow.open { transform: rotate(90deg); }
    .tree-body { display: none; }
    .tree-body.open { display: flex; flex-direction: column; }
    .empty-label { font-style: italic; opacity: .4; font-size: 12px; }
  </style>
</head>
<body class="min-h-screen font-sans antialiased">

<!-- ======== NAVBAR ======== -->
<nav class="nav-glass">
  <div class="mx-auto max-w-[1200px] px-6 h-14 flex items-center justify-between">
    <a href="index.html" class="text-lg font-bold bg-gradient-to-r from-primary to-primaryLight bg-clip-text text-transparent tracking-tight">MyTools</a>
    <div class="flex items-center gap-1">
      <a href="index.html" class="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-300 hover:bg-white/10">返回首页</a>
      <button id="themeToggle" class="ml-2 w-9 h-9 rounded-lg border border-white/10 bg-white/5 flex items-center justify-center text-sm text-gray-400 hover:bg-white/10 hover:text-gray-200 transition" title="切换主题">
        <span id="themeIcon">☽️</span>
      </button>
    </div>
  </div>
</nav>

<!-- ======== MAIN ======== -->
<main class="mx-auto pt-10 pb-16">
  <header class="text-center mb-12">
    <div class="text-5xl mb-4">📦</div>
    <h1 class="text-4xl font-extrabold text-[var(--text)] mb-2">下载中心</h1>
    <p class="text-[var(--text-muted)] text-base">获取浏览器脚本和其他工具资源</p>
  </header>

  <div style="max-width:42rem;margin:0 auto;padding:0 1.5rem;">
    <!-- Switcher -->
    <div class="switch-bar">
      <button class="switch-btn active" data-view="downloads">下载列表</button>
      <button class="switch-btn" data-view="repository">仓库目录</button>
    </div>

    <!-- Downloads panel -->
    <div id="panel-downloads" class="switch-panel active">
      <div class="section-title">可用下载</div>
      <div id="downloadList" class="space-y-3"></div>
    </div>

    <!-- Repository directory panel -->
    <div id="panel-repository" class="switch-panel">
      <div class="section-title">仓库文件结构</div>
      <div id="repoTree" class="repo-container"></div>
    </div>
  </div>
</main>

<!-- ======== SCRIPTS ======== -->
<script src="assets/js/tools.js"></script>
<script src="assets/js/download.js"></script>
<script>
  (function () {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', function () { window.toggleTheme(); });

    // View switcher
    var viewBtns = document.querySelectorAll('.switch-btn');
    viewBtns.forEach(function (b) {
      b.addEventListener('click', function () {
        viewBtns.forEach(function (t) { t.classList.remove('active'); });
        b.classList.add('active');
        document.querySelectorAll('.switch-panel').forEach(function (p) { p.classList.remove('active'); });
        document.getElementById('panel-' + b.dataset.view).classList.add('active');
      });
    });
  })();
</script>
</body>
</html>
