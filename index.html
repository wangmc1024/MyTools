<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTools — AI Tools Center</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">MyTools</a>
    <div class="navbar-links">
      <a href="#" id="navTools" class="active">工具</a>
      <a href="#" id="navDownload">下载</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <span id="themeToggleIcon"></span>
      </button>
    </div>
  </div>
</nav>

<div class="page-wrapper">

  <!-- ====== 工具面板 ====== -->
  <div id="panelTools">

    <header class="dashboard-header">
      <span class="logo-icon">🛠️</span>
      <h1>AI Tools Center</h1>
      <p>My Personal AI & Software Collection</p>
    </header>

    <!-- Quick links -->
    <section class="quick-links">
      <a href="https://wangmc1024.github.io" target="_blank" rel="noopener" class="blog-card">
        <span class="blog-icon">📝</span>
        <div class="blog-info">
          <div class="blog-title">我的博客</div>
          <div class="blog-desc">记录学习笔记与技术思考</div>
        </div>
        <span class="blog-arrow">→</span>
      </a>
    </section>

    <!-- Section divider -->
    <section class="tools-section">
      <h2 class="section-title">
        <span class="section-icon">💻</span>
        Web 应用
      </h2>
      <div class="tools-grid app-grid" id="appGrid"></div>
    </section>

    <section class="tools-section">
      <h2 class="section-title">
        <span class="section-icon">🧩</span>
        浏览器脚本 &amp; 效率工具
      </h2>
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索工具名称、描述...">
      </div>
      <div class="category-tabs" id="categoryTabs"></div>
      <div class="tools-grid" id="toolsGrid"></div>
      <div id="scriptsEmptyState" class="empty-state" style="display:none;">
        <div class="empty-state-icon">🔍</div>
        <p>没有找到匹配的工具</p>
      </div>
    </section>

  </div>

  <!-- ====== 下载面板 ====== -->
  <div id="panelDownload" style="display:none;">

    <header class="dashboard-header">
      <span class="logo-icon">📦</span>
      <h1>下载中心</h1>
      <p>获取浏览器脚本和其他资源</p>
      <div class="subtitle">基于 Gitee 仓库结构，浏览并下载任意文件</div>
    </header>

    <div class="download-tabs">
      <button class="download-tab active" data-view="tree">目录浏览</button>
      <button class="download-tab" data-view="list">工具列表</button>
    </div>

    <div id="downloadTreeView"></div>
    <div id="downloadListView" style="display:none;"></div>

  </div>

</div>

<script src="assets/js/tools.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
