<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTools — AI Tools Center</title>
  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#635bff',
            primaryLight: '#7f74ff',
          },
          fontFamily: {
            sans: ['Inter', 'Segoe UI', '-apple-system', 'BlinkMacSystemFont', 'Helvetica Neue', 'Noto Sans SC', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* ---- Theme variables for JS-accessible colors ---- */
    :root, [data-theme="dark"] {
      --bg: #0a0e1a;
      --bg-card: rgba(255,255,255,0.08);
      --bg-card-hover: rgba(255,255,255,0.14);
      --text: #e8eaf0;
      --text-muted: #9ca3af;
      --border: rgba(255,255,255,0.1);
      --label-bg: rgba(10,14,26,0.75);
      --label-stroke: rgba(10,14,26,0.9);
    }
    [data-theme="light"] {
      --bg: #f0f2f8;
      --bg-card: rgba(0,0,0,0.04);
      --bg-card-hover: rgba(0,0,0,0.08);
      --text: #1a1a2e;
      --text-muted: #666;
      --border: rgba(0,0,0,0.1);
      --label-bg: rgba(240,242,248,0.85);
      --label-stroke: rgba(240,242,248,0.9);
    }

    body { background: var(--bg); color: var(--text); font-family: inherit; transition: background .3s, color .3s; }

    /* ---- Navbar glassmorphism ---- */
    .nav-glass {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(17,24,39,.72) !important;
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .nav-glass {
      background: rgba(255,255,255,.72) !important;
    }

    /* ---- Active nav link ---- */
    .active-tool { color: #fff; background: rgba(99,91,255,.15); }
    [data-theme="light"] .active-tool { color: #635bff; background: rgba(99,91,255,.1); }

    /* ---- Search input ---- */
    .search-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color .3s, box-shadow .3s;
    }
    .search-box:focus {
      outline: none;
      border-color: #635bff;
      box-shadow: 0 0 0 3px rgba(99,91,255,.2);
    }

    /* ---- Category tabs ---- */
    .cat-tab {
      background: var(--bg-card); border: 1px solid var(--border);
      transition: all .25s; cursor: pointer; user-select: none;
    }
    .cat-tab:hover { background: var(--bg-card-hover); }
    .cat-tab.active {
      background: #635bff; color: #fff; border-color: #635bff;
    }

    /* ---- Blog card ---- */
    .blog-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all .3s;
    }
    .blog-card:hover {
      border-color: #635bff; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,91,255,.18);
    }

    /* ---- Tooltip ---- */
    #tooltip {
      position: fixed; z-index: 9999; pointer-events: none;
      background: rgba(17,24,39,.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 14px 18px;
      max-width: 280px; font-size: 13px; line-height: 1.6;
      opacity: 0; transition: opacity .2s;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    #tooltip.show { opacity: 1; }
    [data-theme="light"] #tooltip {
      background: rgba(255,255,255,.96);
      border-color: rgba(0,0,0,.12);
      box-shadow: 0 12px 40px rgba(0,0,0,.1);
    }

    /* ---- Canvas ---- */
    #canvas-wrap {
      width: 100%; height: 520px; border-radius: 16px; overflow: hidden;
      background: linear-gradient(180deg, rgba(99,91,255,.06) 0%, transparent 60%);
      border: 1px solid var(--border);
      position: relative;
    }
    #svg-canvas { display: block; width: 100%; height: 100%; }

    /* ---- Nodes & Links (native mode) ---- */
    .node-group { cursor: pointer; }
    .node-circle {
      stroke: rgba(255,255,255,.2); stroke-width: 1.5;
      filter: drop-shadow(0 0 6px rgba(99,91,255,.45));
      transition: filter .2s;
    }
    [data-theme="light"] .node-circle {
      stroke: rgba(0,0,0,.15);
      filter: drop-shadow(0 0 4px rgba(99,91,255,.3));
    }
    .node-group:hover .node-circle {
      filter: drop-shadow(0 0 14px rgba(99,91,255,.7));
    }
    .node-icon { pointer-events: none; }
    .node-label {
      font-size: 11px; fill: #fff; pointer-events: none;
      paint-order: stroke; stroke: var(--label-stroke, rgba(10,14,26,.85)); stroke-width: 3px;
      transition: fill .3s, stroke .3s, stroke-width .3s;
    }
    [data-theme="light"] .node-label {
      fill: var(--text, #1a1a2e);
    }
    .status-dot { pointer-events: none; }

    /* ---- Star twinkle (single circle, keyframe-driven) ---- */
    @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.7} }
    .star { animation: twinkle 3s ease-in-out infinite; }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body class="min-h-screen font-sans antialiased">

<!-- ======== NAVBAR ======== -->
<nav class="nav-glass">
  <div class="mx-auto max-w-[1200px] px-6 h-14 flex items-center justify-between">
    <a href="index.html" class="text-lg font-bold bg-gradient-to-r from-primary to-primaryLight bg-clip-text text-transparent tracking-tight">
      MyTools
    </a>
    <div class="flex items-center gap-1">
      <a href="#" id="navTools" class="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-300 hover:bg-white/10 active-tool">工具</a>
      <a href="downloads.html" id="navDownloads" class="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-300 hover:bg-white/10">下载</a>
      <button id="themeToggle" class="ml-2 w-9 h-9 rounded-lg border border-white/10 bg-white/5 flex items-center justify-center text-sm text-gray-400 hover:bg-white/10 hover:text-gray-200 transition" title="切换主题">

<!-- ======== MAIN ======== -->
<main class="mx-auto max-w-[1200px] px-6 pt-8 pb-12">

  <!-- HERO -->
  <header class="text-center mb-8">
    <div class="text-5xl mb-3">🛠️</div>
    <h1 class="text-4xl font-extrabold bg-gradient-to-r from-[var(--text)] via-primary to-primaryLight bg-clip-text text-transparent mb-2">AI Tools Center</h1>
    <p class="text-[var(--text-muted)] text-base">My Personal AI &amp; Software Collection</p>
  </header>

  <!-- BLOG CARD -->
  <section class="mb-10">
    <a href="https://wangmc1024.github.io" target="_blank" rel="noopener" class="blog-card block max-w-xl mx-auto rounded-2xl p-5 flex items-center gap-5">
      <span class="text-3xl shrink-0">📝</span>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-[var(--text)]">我的博客</div>
        <div class="text-sm text-[var(--text-muted)] truncate">记录学习笔记与技术思考</div>
      </div>

    </a>
  </section>

  <!-- TOOLS PANEL -->
  <section id="panelTools">
    <!-- Search + Categories -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 mb-6">
      <div class="relative flex-1 max-w-md">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-[var(--text-muted)] pointer-events-none">🔍</span>
        <input id="searchInput" type="text" placeholder="搜索工具名称、描述..." class="search-box w-full pl-10 pr-4 py-2.5 rounded-xl text-sm">
      </div>
      <div id="categoryTabs" class="flex gap-2 flex-wrap"></div>
    </div>

    <!-- Star-canvas -->
    <div id="canvas-wrap"><svg id="svg-canvas"></svg></div>
  </section>

</main>

<!-- ======== TOOLTIP ======== -->
<div id="tooltip"></div>

<!-- ======== SCRIPTS (shared) ======== -->
<script src="assets/js/tools.js"></script>

<!-- ======== MAIN LOGIC ======== -->
<script>
(function () {
  'use strict';

  /* ---- Theme toggle ---- */
  var origToggleTheme = window.toggleTheme;
  window.toggleTheme = function() {
    origToggleTheme();
    if (gStars && currentW && currentH) drawStars(currentW, currentH);
  };
  document.getElementById('themeToggle').addEventListener('click', function () { window.toggleTheme(); });

  /* ================================================================
     TOOLS DATA — loaded from assets/data/tools.json at runtime
     Categories are auto-derived from unique type/category values.
     ================================================================ */
  var TOOLS_DATA = [];
  var CATEGORIES = ['全部'];
  var filteredTools = [];
  var activeCategory = '全部';
  var searchQuery = '';

  /** Build unique category list from loaded tools data */
  function buildCategories(data) {
    var map = {};
    data.forEach(function(t) {
      if (!t) return;
      if (t.type) map[t.type] = true;
      if (t.category) map[t.category] = true;
    });
    return ['全部'].concat(Object.keys(map));
  }

  /* Fetch tools.json on init */
  fetch('assets/data/tools.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      TOOLS_DATA = data;
      CATEGORIES = buildCategories(data);
      renderCategories();
      applyFilters();
    })
    .catch(function(err) {
      console.error('Failed to load tools.json:', err);
      // Fallback: still render categories and canvas (with empty data)
      renderCategories();
    });

  /* ================================================================
     CATEGORY TABS
     ================================================================ */
  function renderCategories() {
    var container = document.getElementById('categoryTabs');
    container.innerHTML = CATEGORIES.map(function(cat) {
      return '<span class="cat-tab ' + (cat === activeCategory ? 'active' : '') + ' px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-cat="' + esc(cat) + '">' + esc(cat) + '</span>';
    }).join('');
    container.addEventListener('click', function(e) {
      var tab = e.target.closest('.cat-tab');
      if (!tab) return;
      container.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      activeCategory = tab.dataset.cat;
      applyFilters();
    });
  }

  /* ================================================================
     SEARCH
     ================================================================ */
  document.getElementById('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value.toLowerCase().trim();
    applyFilters();
  });

  function applyFilters() {
    filteredTools = TOOLS_DATA.filter(function(t) {
      if (!t) return false;
      if (activeCategory !== '全部' && t.category !== activeCategory && t.type !== activeCategory) return false;
      if (searchQuery) {
        var h = ((t.name || '') + ' ' + (t.description || '') + ' ' + (t.type || '') + ' ' + (t.category || '')).toLowerCase();
        if (h.indexOf(searchQuery) === -1) return false;
      }
      return true;
    });
    rebuildCanvas();
  }

  /* ================================================================
     STAR CANVAS — Native SVG + JS floating animation
     ================================================================ */
  var svgEl, gNode, gLink, gStars;
  var nodeData = [];
  var currentW = 0, currentH = 0;
  var NODE_R = 28;
  var SVG_NS = 'http://www.w3.org/2000/svg';
  var PAD = NODE_R + 12;
  var dragNode = null;
  var dragOffset = { x: 0, y: 0 };

  function safe(v, fallback) {
    var n = parseFloat(v);
    return isNaN(n) ? (fallback !== undefined ? fallback : 0) : n;
  }

  function initCanvas() {
    if (svgEl) return;
    var wrap = document.getElementById('canvas-wrap');
    if (!wrap) return;
    void wrap.offsetHeight;

    currentW = safe(wrap.clientWidth, 683);
    currentH = safe(wrap.clientHeight, 518);
    if (!currentW || !currentH) return;

    svgEl = document.getElementById('svg-canvas');
    svgEl.setAttribute('viewBox', '0 0 ' + currentW + ' ' + currentH);
    while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

    var defs = document.createElementNS(SVG_NS, 'defs');
    var nodeGrad = createSVG('radialGradient', { id: 'node-grad' });
    addStop(nodeGrad, '0%', '#8b83ff');
    addStop(nodeGrad, '70%', '#635bff');
    addStop(nodeGrad, '100%', '#4f46e5');
    defs.appendChild(nodeGrad);
    svgEl.appendChild(defs);

    var mainGroup = createSVG('g');
    gStars = createSVG('g');
    gLink = createSVG('g');
    gNode = createSVG('g');
    mainGroup.appendChild(gStars);
    mainGroup.appendChild(gLink);
    mainGroup.appendChild(gNode);
    svgEl.appendChild(mainGroup);

    drawStars(currentW, currentH);
    buildLayout();

    // Global drag handlers
    document.addEventListener('mousemove', handleMouseMove);
    document.addEventListener('mouseup', handleMouseUp);
  }

  function handleMouseMove(ev) {
    if (!dragNode) return;
    var svgRect = svgEl.getBoundingClientRect();
    var mx = ev.clientX - svgRect.left;
    var my = ev.clientY - svgRect.top;

    // Track that drag movement occurred
    var dx = mx - dragNode.lastDragX;
    var dy = my - dragNode.lastDragY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
      dragNode._hasMoved = true;
    }

    // Calculate velocity from drag movement
    var now = performance.now();
    var dt = now - dragNode.lastDragTime;
    if (dt > 0) {
      dragNode.vx = dx / dt * 16;
      dragNode.vy = dy / dt * 16;
    }
    dragNode.lastDragX = mx;
    dragNode.lastDragY = my;
    dragNode.lastDragTime = now;

    // Update position
    dragNode.x = Math.max(PAD, Math.min(currentW - PAD, mx - dragOffset.x));
    dragNode.y = Math.max(PAD, Math.min(currentH - PAD, my - dragOffset.y));
  }

  function handleMouseUp() {
    if (dragNode) {
      dragNode.dragging = false;
      // Only mark as dragged if there was actual movement
      if (dragNode._hasMoved) {
        dragNode._wasDragged = true;
        dragNode._hasMoved = false;
      }
      // Limit velocity after release
      var speed = Math.sqrt(dragNode.vx * dragNode.vx + dragNode.vy * dragNode.vy);
      var maxDragSpeed = 4;
      if (speed > maxDragSpeed) {
        dragNode.vx *= maxDragSpeed / speed;
        dragNode.vy *= maxDragSpeed / speed;
      }
      dragNode = null;
    }
  }

  function drawStars(w, h) {
    if (!gStars || !w || !h) return;
    while (gStars.firstChild) gStars.removeChild(gStars.firstChild);
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var starCount = isDark ? Math.floor((w * h) / 800) : Math.floor((w * h) / 2000);
    for (var i = 0; i < starCount; i++) {
      var r = isDark ? (Math.random() * 0.8 + 0.2) : (Math.random() * 1.2 + 0.4);
      var opacity = isDark ? (Math.random() * 0.5 + 0.15) : (Math.random() * 0.4 + 0.25);
      var c = createSVG('circle', {
        cx: Math.random() * w, cy: Math.random() * h,
        r: r, class: 'star',
        opacity: opacity,
        fill: isDark ? undefined : (Math.random() > 0.5 ? '#635bff' : '#888')
      });
      c.style.animationDuration = (1.5 + Math.random() * 4).toFixed(1) + 's';
      c.style.animationDelay = (Math.random() * 6).toFixed(1) + 's';
      gStars.appendChild(c);
    }
    // Add a few larger "bright" stars for dark mode
    if (isDark) {
      var brightCount = Math.floor((w * h) / 12000);
      for (var i = 0; i < brightCount; i++) {
        var c = createSVG('circle', {
          cx: Math.random() * w, cy: Math.random() * h,
          r: Math.random() * 1.2 + 0.6, class: 'star',
          opacity: Math.random() * 0.4 + 0.3,
          fill: Math.random() > 0.7 ? '#c4b5fd' : '#fff'
        });
        c.style.animationDuration = (2 + Math.random() * 3).toFixed(1) + 's';
        c.style.animationDelay = (Math.random() * 4).toFixed(1) + 's';
        gStars.appendChild(c);
      }
    }
  }

  function buildLayout() {
    if (!filteredTools || !filteredTools.length) {
      while (gNode && gNode.firstChild) gNode.removeChild(gNode.firstChild);
      while (gLink && gLink.firstChild) gLink.removeChild(gLink.firstChild);
      nodeData = [];
      return;
    }

    var w = currentW, h = currentH;
    var count = filteredTools.length;
    nodeData = filteredTools.map(function(t, i) {
      var seed = i * 137.508;
      var speed = 0.3 + Math.random() * 0.5;
      var angle = Math.random() * Math.PI * 2;
      return {
        tool: t,
        x: PAD + Math.random() * (w - PAD * 2),
        y: PAD + Math.random() * (h - PAD * 2),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: NODE_R,
        phase: (seed * 0.618) % (Math.PI * 2),
        pulseSpeed: 2 + Math.random() * 3,
        dragging: false,
        hovered: false
      };
    });

    while (gLink.firstChild) gLink.removeChild(gLink.firstChild);

    while (gNode.firstChild) gNode.removeChild(gNode.firstChild);
    nodeData.forEach(function(nd) {
      var g = createSVG('g', { class: 'node-group' });

      // Outer glow ring (animated in tick)
      g.appendChild(createSVG('circle', {
        class: 'glow-ring',
        r: NODE_R + 6, fill: 'none', stroke: '#635bff', 'stroke-width': 2, opacity: 0.15
      }));
      // Static outer ring
      g.appendChild(createSVG('circle', {
        r: NODE_R + 3, fill: 'none', stroke: '#635bff', 'stroke-width': 3, opacity: 0.15
      }));
      g.appendChild(createSVG('circle', { r: NODE_R, class: 'node-circle', fill: 'url(#node-grad)' }));

      var iconText = createSVG('text', {
        class: 'node-icon', dy: '0.35em', 'text-anchor': 'middle', 'font-size': '22px'
      });
      iconText.textContent = (nd.tool && nd.tool.icon) || '?';
      g.appendChild(iconText);

      g.appendChild(createSVG('rect', {
        x: -60, y: NODE_R + 2, width: 120, height: 18, rx: 4,
        fill: 'var(--label-bg)'
      }));

      var label = createSVG('text', {
        class: 'node-label', dy: NODE_R + 14, 'text-anchor': 'middle'
      });
      label.textContent = (nd.tool && nd.tool.name) || 'Unknown';
      g.appendChild(label);

      if (nd.tool && nd.tool.status === 'online') {
        g.appendChild(createSVG('circle', {
          class: 'status-dot',
          cx: NODE_R * 0.7, cy: -NODE_R * 0.7, r: 4,
          fill: '#10b981', stroke: 'var(--bg)', 'stroke-width': 2
        }));
      }

      g.addEventListener('click', function(ev) {
        ev.stopPropagation();
        if (nd._wasDragged) { nd._wasDragged = false; return; }
        if (!dragNode && nd.tool && nd.tool.url) window.location.href = nd.tool.url;
      });
      g.addEventListener('mouseenter', function(ev) {
        nd.hovered = true;
        if (nd.tool) showTooltip(ev, nd.tool);
      });
      g.addEventListener('mousemove', function(ev) { moveTooltip(ev.clientX, ev.clientY); });
      g.addEventListener('mouseleave', function() {
        nd.hovered = false;
        hideTooltip();
      });

      // Drag support
      g.addEventListener('mousedown', function(ev) {
        ev.preventDefault();
        ev.stopPropagation();
        dragNode = nd;
        nd._wasDragged = false;
        var svgRect = svgEl.getBoundingClientRect();
        var mx = ev.clientX - svgRect.left;
        var my = ev.clientY - svgRect.top;
        dragOffset.x = mx - nd.x;
        dragOffset.y = my - nd.y;
        nd.dragging = true;
        nd.lastDragX = mx;
        nd.lastDragY = my;
        nd.lastDragTime = performance.now();
      });

      gNode.appendChild(g);
    });

    // Set initial positions immediately
    var groups = gNode.querySelectorAll('.node-group');
    for (var i = 0; i < nodeData.length && i < groups.length; i++) {
      var nd = nodeData[i];
      if (nd) {
        groups[i].setAttribute('transform', 'translate(' + nd.x.toFixed(2) + ',' + nd.y.toFixed(2) + ')');
      }
    }

    startAnimationLoop();
  }

  var animRunning = false;
  var animFrameId = null;

  function startAnimationLoop() {
    if (animRunning) return;
    if (!gNode || !gNode.querySelector('.node-group')) {
      requestAnimationFrame(startAnimationLoop);
      return;
    }
    animRunning = true;
    animFrameId = requestAnimationFrame(tick);
  }

  function tick() {
    var w = currentW, h = currentH;
    var damp = 0.999;
    var maxSpeed = 2.2;
    var minSpeed = 0.3;
    var now = performance.now();

    for (var i = 0; i < nodeData.length; i++) {
      var nd = nodeData[i];
      if (!nd) continue;

      // Skip physics update while dragging or hovered
      if (!nd.dragging && !nd.hovered) {
        nd.x += nd.vx;
        nd.y += nd.vy;

        if (nd.x < PAD) { nd.x = PAD; nd.vx = Math.abs(nd.vx); }
        if (nd.x > w - PAD) { nd.x = w - PAD; nd.vx = -Math.abs(nd.vx); }
        if (nd.y < PAD) { nd.y = PAD; nd.vy = Math.abs(nd.vy); }
        if (nd.y > h - PAD) { nd.y = h - PAD; nd.vy = -Math.abs(nd.vy); }

        var speed = Math.sqrt(nd.vx * nd.vx + nd.vy * nd.vy);
        if (speed > maxSpeed) { nd.vx *= maxSpeed / speed; nd.vy *= maxSpeed / speed; }
        if (speed < minSpeed) { nd.vx *= 1.02; nd.vy *= 1.02; }

        nd.vx *= damp;
        nd.vy *= damp;
      }
    }

    // Update node positions with breathing pulse + glow ring
    var nodeGroups = gNode.querySelectorAll('.node-group');
    for (var i = 0; i < nodeGroups.length && i < nodeData.length; i++) {
      var nd = nodeData[i];
      if (!nd) continue;
      var pulse = 1 + Math.sin(now / 1000 * nd.pulseSpeed + nd.phase) * 0.06;
      nodeGroups[i].setAttribute('transform', 'translate(' + nd.x.toFixed(2) + ',' + nd.y.toFixed(2) + ') scale(' + pulse.toFixed(3) + ')');

      // Glow ring animation
      var glowRing = nodeGroups[i].querySelector('.glow-ring');
      if (glowRing) {
        var glowOpacity = 0.15 + Math.sin(now / 800 * nd.pulseSpeed + nd.phase) * 0.08;
        var glowR = NODE_R + 6 + Math.sin(now / 600 * nd.pulseSpeed + nd.phase) * 3;
        glowRing.setAttribute('r', glowR.toFixed(1));
        glowRing.setAttribute('opacity', glowOpacity.toFixed(2));
      }
    }

    // Compute dynamic links
    var links = [];
    for (var i = 0; i < nodeData.length; i++) {
      for (var j = i + 1; j < nodeData.length; j++) {
        var dx = nodeData[i].x - nodeData[j].x;
        var dy = nodeData[i].y - nodeData[j].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 220) {
          links.push({
            x1: nodeData[i].x, y1: nodeData[i].y,
            x2: nodeData[j].x, y2: nodeData[j].y,
            dist: dist
          });
        }
      }
    }

    // Redraw links with shimmer effect
    while (gLink.firstChild) gLink.removeChild(gLink.firstChild);
    for (var i = 0; i < links.length; i++) {
      var l = links[i];
      var baseOpacity = Math.max(0, 1 - l.dist / 220) * 0.35;
      var shimmer = Math.sin(now / 500 + l.dist * 0.05) * 0.12;
      var opacity = Math.max(0, Math.min(0.5, baseOpacity + shimmer));
      var line = createSVG('line', {
        x1: l.x1, y1: l.y1, x2: l.x2, y2: l.y2,
        stroke: '#000', 'stroke-width': 0.6, opacity: opacity
      });
      gLink.appendChild(line);
    }

    animFrameId = requestAnimationFrame(tick);
  }

  /* ---- SVG element factory ---- */
  function createSVG(tag, attrs) {
    var el = document.createElementNS(SVG_NS, tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) { el.setAttribute(k, attrs[k]); });
    }
    return el;
  }
  function addStop(parent, offset, color) {
    parent.appendChild(createSVG('stop', { offset: offset, 'stop-color': color }));
  }

  /* ---- Tooltip ---- */
  function showTooltip(event, d) {
    var tooltip = document.getElementById('tooltip');
    if (!tooltip || !d) return;
    var isDark = getTheme() === 'dark';
    var descHtml = '<div class="font-semibold mb-1 text-sm" style="color:' + (isDark ? '#fff' : '#1a1a2e') + '">' + esc(d.name || '') + '</div>';
    if (d.version) descHtml += '<div class="text-xs" style="color:' + (isDark ? '#9ca3af' : '#888') + '">' + esc(d.version) + ' · ' + esc(d.type || '') + '</div>';
    descHtml += '<div class="text-xs mt-1 leading-relaxed" style="color:' + (isDark ? '#d1d5db' : '#555') + '">' + esc(d.description || '') + '</div>';
    descHtml += '<div class="mt-2 flex items-center gap-2"><span class="inline-block w-2 h-2 rounded-full ' + (d.status === 'online' ? 'bg-emerald-400' : 'bg-red-400') + '"></span><span class="text-xs" style="color:' + (isDark ? '#9ca3af' : '#888') + '">' + (d.status === 'online' ? 'Online' : 'Offline') + '</span>';
    if (d.downloadUrl) descHtml += ' <button class="ml-auto px-2.5 py-1 bg-primary rounded-lg text-xs text-white hover:bg-primaryLight transition cursor-pointer" data-dl="' + esc(d.downloadUrl) + '">下载</button>';
    if (d.url) descHtml += ' <button class="px-2.5 py-1 border border-white/20 rounded-lg text-xs text-gray-300 hover:bg-white/10 transition cursor-pointer" data-open="' + esc(d.url) + '">打开</button>';
    descHtml += '</div>';
    tooltip.innerHTML = descHtml;
    tooltip.classList.add('show');
    moveTooltip(event.clientX, event.clientY);
    tooltip.querySelectorAll('[data-dl]').forEach(function(btn) {
      btn.addEventListener('click', function() { window.handleDownload(btn.dataset.dl); });
    });
    tooltip.querySelectorAll('[data-open]').forEach(function(btn) {
      btn.addEventListener('click', function() { window.location.href = btn.dataset.open; });
    });
  }
  function moveTooltip(cx, cy) {
    var tip = document.getElementById('tooltip');
    if (!tip) return;
    var tw = tip.offsetWidth, th = tip.offsetHeight;
    var left = cx + 16, top = cy - 10;
    if (left + tw > window.innerWidth - 12) left = cx - tw - 16;
    if (top + th > window.innerHeight - 12) top = window.innerHeight - th - 12;
    if (top < 12) top = 12;
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }
  function hideTooltip() {
    var tip = document.getElementById('tooltip');
    if (tip) tip.classList.remove('show');
  }

  var initPending = false; // Guard against double scheduling of initCanvas

  /* ---- Rebuild canvas ---- */
  function rebuildCanvas() {
    // Stop old loop
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    animRunning = false;

    if (!svgEl) {
      // Prevent scheduling multiple initCanvas calls
      if (initPending) return;
      initPending = true;

      // Fully destroyed — re-init from DOM
      var wrap = document.getElementById('canvas-wrap');
      if (!wrap) { initPending = false; return; }
      var w = safe(wrap.clientWidth, 683);
      var h = safe(wrap.clientHeight, 518);
      if (!w || !h) { initPending = false; return; }

      requestAnimationFrame(function() {
        initCanvas();
        initPending = false;
      });
    } else {
      // Partial rebuild — clear groups only
      while (gNode && gNode.firstChild) gNode.removeChild(gNode.firstChild);
      while (gLink && gLink.firstChild) gLink.removeChild(gLink.firstChild);
      nodeData = [];
      requestAnimationFrame(function() {
        buildLayout();
      });
    }
  }

  /* ---- Resize handling ---- */
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      var wrap = document.getElementById('canvas-wrap');
      if (!wrap) return;
      var w = safe(wrap.clientWidth, 683);
      var h = safe(wrap.clientHeight, 518);
      if (w && h && filteredTools.length) {
        currentW = w; currentH = h;
        rebuildCanvas();
      }
    }, 200);
  });

  /* ================================================================
     INIT
     Always render categories (they may already have defaults from global scope)
     ================================================================ */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { renderCategories(); });
  } else {
    renderCategories();
  }
})();
</script>
