<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTools — AI Tools Center</title>
  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#635bff',
            primaryLight: '#7f74ff',
          },
          fontFamily: {
            sans: ['Inter', 'Segoe UI', '-apple-system', 'BlinkMacSystemFont', 'Helvetica Neue', 'Noto Sans SC', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <!-- D3.js v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    /* ---- Theme variables for JS-accessible colors ---- */
    :root, [data-theme="dark"] {
      --bg: #0a0e1a;
      --bg-card: rgba(255,255,255,0.08);
      --bg-card-hover: rgba(255,255,255,0.14);
      --text: #e8eaf0;
      --text-muted: #9ca3af;
      --border: rgba(255,255,255,0.1);
      --glow: rgba(99,91,255,0.35);
      --label-bg: rgba(10,14,26,0.75);
      --label-stroke: rgba(10,14,26,0.9);
    }
    [data-theme="light"] {
      --bg: #f0f2f8;
      --bg-card: rgba(0,0,0,0.04);
      --bg-card-hover: rgba(0,0,0,0.08);
      --text: #1a1a2e;
      --text-muted: #666;
      --border: rgba(0,0,0,0.1);
      --glow: rgba(99,91,255,0.25);
      --label-bg: rgba(240,242,248,0.85);
      --label-stroke: rgba(240,242,248,0.9);
    }

    body { background: var(--bg); color: var(--text); font-family: inherit; transition: background .3s, color .3s; }

    /* ---- Navbar glassmorphism ---- */
    .nav-glass {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(17,24,39,.72) !important;
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .nav-glass {
      background: rgba(255,255,255,.72) !important;
    }

    /* ---- Active nav link ---- */
    .active-tool { color: #fff; background: rgba(99,91,255,.15); }
    [data-theme="light"] .active-tool { color: #635bff; background: rgba(99,91,255,.1); }

    /* ---- Search input ---- */
    .search-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color .3s, box-shadow .3s;
    }
    .search-box:focus {
      outline: none;
      border-color: #635bff;
      box-shadow: 0 0 0 3px rgba(99,91,255,.2);
    }

    /* ---- Category tabs ---- */
    .cat-tab {
      background: var(--bg-card); border: 1px solid var(--border);
      transition: all .25s; cursor: pointer; user-select: none;
    }
    .cat-tab:hover { background: var(--bg-card-hover); }
    .cat-tab.active {
      background: #635bff; color: #fff; border-color: #635bff;
    }

    /* ---- Blog card ---- */
    .blog-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all .3s;
    }
    .blog-card:hover {
      border-color: #635bff; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,91,255,.18);
    }

    /* ---- Tooltip ---- */
    #tooltip {
      position: fixed; z-index: 9999; pointer-events: none;
      background: rgba(17,24,39,.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 14px 18px;
      max-width: 280px; font-size: 13px; line-height: 1.6;
      opacity: 0; transition: opacity .2s;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    #tooltip.show { opacity: 1; }
    [data-theme="light"] #tooltip {
      background: rgba(255,255,255,.96);
      border-color: rgba(0,0,0,.12);
      box-shadow: 0 12px 40px rgba(0,0,0,.1);
    }

    /* ---- Canvas ---- */
    #canvas-wrap {
      width: 100%; height: 520px; border-radius: 16px; overflow: hidden;
      background: linear-gradient(180deg, rgba(99,91,255,.06) 0%, transparent 60%);
      border: 1px solid var(--border);
      position: relative;
    }
    #svg-canvas { display: block; width: 100%; height: 100%; }

    /* ---- Nodes & Links ---- */
    .node-group { cursor: pointer; }
    .node-group:active { cursor: grabbing; }
    .node-circle {
      fill: #635bff; stroke: rgba(255,255,255,.2); stroke-width: 1.5;
      filter: drop-shadow(0 0 6px rgba(99,91,255,.45));
      transition: filter .2s;
    }
    .node-group:hover .node-circle {
      filter: drop-shadow(0 0 14px rgba(99,91,255,.7));
    }
    [data-theme="light"] .node-circle {
      filter: drop-shadow(0 0 4px rgba(99,91,255,.3));
    }
    .node-icon { pointer-events: none; }
    .node-label {
      font-size: 11px; fill: var(--text); pointer-events: none; text-anchor: middle;
      transition: fill .3s, paint-order .3s, stroke .3s, stroke-width .3s;
    }
    .status-dot { pointer-events: none; }

    /* ---- Fade-out transition ---- */
    .fade-out { opacity: 0; }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body class="min-h-screen font-sans antialiased">

<!-- ======== NAVBAR ======== -->
<nav class="nav-glass">
  <div class="mx-auto max-w-[1200px] px-6 h-14 flex items-center justify-between">
    <a href="index.html" class="text-lg font-bold bg-gradient-to-r from-primary to-primaryLight bg-clip-text text-transparent tracking-tight">
      MyTools
    </a>
    <div class="flex items-center gap-1">
      <a href="#" id="navTools" class="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-300 hover:bg-white/10 active-tool">工具</a>
      <a href="downloads.html" id="navDownloads" class="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-300 hover:bg-white/10">下载</a>
      <button id="themeToggle" class="ml-2 w-9 h-9 rounded-lg border border-white/10 bg-white/5 flex items-center justify-center text-sm text-gray-400 hover:bg-white/10 hover:text-gray-200 transition" title="切换主题">
        <span id="themeIcon">☽️</span>
      </button>
    </div>
  </div>
</nav>

<!-- ======== MAIN ======== -->
<main class="mx-auto max-w-[1200px] px-6 pt-8 pb-12">

  <!-- HERO -->
  <header class="text-center mb-8">
    <div class="text-5xl mb-3">🛠️</div>
    <h1 class="text-4xl font-extrabold bg-gradient-to-r from-[var(--text)] via-primary to-primaryLight bg-clip-text text-transparent mb-2">AI Tools Center</h1>
    <p class="text-[var(--text-muted)] text-base">My Personal AI &amp; Software Collection</p>
  </header>

  <!-- BLOG CARD -->
  <section class="mb-10">
    <a href="https://wangmc1024.github.io" target="_blank" rel="noopener" class="blog-card block max-w-xl mx-auto rounded-2xl p-5 flex items-center gap-5">
      <span class="text-3xl shrink-0">📝</span>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-[var(--text)]">我的博客</div>
        <div class="text-sm text-[var(--text-muted)] truncate">记录学习笔记与技术思考</div>
      </div>
      <span class="shrink-0 text-primaryLight text-lg">→</span>
    </a>
  </section>

  <!-- TOOLS PANEL -->
  <section id="panelTools">
    <!-- Search + Categories -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 mb-6">
      <div class="relative flex-1 max-w-md">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-[var(--text-muted)] pointer-events-none">🔍</span>
        <input id="searchInput" type="text" placeholder="搜索工具名称、描述..." class="search-box w-full pl-10 pr-4 py-2.5 rounded-xl text-sm">
      </div>
      <div id="categoryTabs" class="flex gap-2 flex-wrap"></div>
    </div>

    <!-- Star-canvas -->
    <div id="canvas-wrap"><svg id="svg-canvas"></svg></div>
  </section>

</main>

<!-- ======== TOOLTIP ======== -->
<div id="tooltip"></div>

<!-- ======== SCRIPTS (shared) ======== -->
<script src="assets/js/tools.js"></script>

<!-- ======== MAIN LOGIC ======== -->
<script>
(function () {
  'use strict';

  /* ---- Theme toggle ---- */
  document.getElementById('themeToggle').addEventListener('click', function () { window.toggleTheme(); });

  /* ================================================================
     TOOLS DATA — loaded from assets/data/tools.json at runtime
     ================================================================ */
  let TOOLS_DATA = [];
  const CATEGORIES = ['全部', 'Web Tool', '浏览器脚本', '效率工具', '阅读', '学习'];
  let filteredTools = [];
  let activeCategory = '全部';
  let searchQuery = '';

  /* Fetch tools.json on init */
  fetch('assets/data/tools.json')
    .then(r => r.json())
    .then(data => {
      TOOLS_DATA = data;
      applyFilters();
    })
    .catch(() => console.error('Failed to load tools.json'));

  /* ================================================================
     CATEGORY TABS
     ================================================================ */
  function renderCategories() {
    const container = document.getElementById('categoryTabs');
    container.innerHTML = CATEGORIES.map(cat =>
      `<span class="cat-tab ${cat === activeCategory ? 'active' : ''} px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-cat="${esc(cat)}">${esc(cat)}</span>`
    ).join('');
    container.addEventListener('click', e => {
      const tab = e.target.closest('.cat-tab');
      if (!tab) return;
      container.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeCategory = tab.dataset.cat;
      applyFilters();
    });
  }

  /* ================================================================
     SEARCH
     ================================================================ */
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    applyFilters();
  });

  function applyFilters() {
    filteredTools = TOOLS_DATA.filter(t => {
      if (activeCategory !== '全部' && t.category !== activeCategory && t.type !== activeCategory) return false;
      if (searchQuery) {
        const h = `${t.name} ${t.description} ${t.type} ${t.category}`.toLowerCase();
        if (!h.includes(searchQuery)) return false;
      }
      return true;
    });
    rebuildCanvas();
  }

  /* ================================================================
     STAR CANVAS — Declarative Node Layout with Animation
     ================================================================ */
  let svgEl = null, gNode = null, gLink = null, gStars = null;
  let nodePositions = null;
  const NODE_R = 28;
  const ICON_SIZE = 22;
  let currentW = 0, currentH = 0;
  let BOUNDARY = { minX: 35, maxX: 1115, minY: 35, maxY: 483 };

  function initCanvas() {
    const wrap = document.getElementById('canvas-wrap');
    currentW = wrap.clientWidth;
    currentH = wrap.clientHeight;
    if (!currentW || !currentH) { currentW = 683; currentH = 518; }

    // Clamp boundary to actual viewBox dims (NODE_R padding from edges)
    const PAD = NODE_R + 7;
    BOUNDARY.minX = PAD; BOUNDARY.maxX = currentW - PAD;
    BOUNDARY.minY = PAD; BOUNDARY.maxY = currentH - PAD;

    svgEl = d3.select('#svg-canvas')
      .attr('viewBox', `0 0 ${currentW} ${currentH}`)
      .attr('width', currentW).attr('height', currentH);
    svgEl.selectAll('*').remove();

    // Defs: glow filter + radial gradient for nodes
    const defs = svgEl.append('defs');
    const glowFilter = defs.append('filter').attr('id', 'glow')
      .attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
    glowFilter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
    const merge = glowFilter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'blur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');

    const nodeGrad = defs.append('radialGradient').attr('id', 'node-grad');
    nodeGrad.append('stop').attr('offset', '0%').attr('stop-color', '#8b83ff');
    nodeGrad.append('stop').attr('offset', '70%').attr('stop-color', '#635bff');
    nodeGrad.append('stop').attr('offset', '100%').attr('stop-color', '#4f46e5');

    // Clip path (preserve id) — padded to prevent edge clipping during floating animation
    svgEl.append('clipPath').attr('id', 'canvas-clip')
      .append('rect').attr('x', -40).attr('y', -40)
        .attr('width', currentW + 80).attr('height', currentH + 80);

    // Groups inside clip (preserve class names)
    const mainGroup = svgEl.append('g').attr('clip-path', 'url(#canvas-clip)');
    gStars = mainGroup.append('g').attr('class', 'stars-layer');
    gLink = mainGroup.append('g').attr('class', 'links-layer');
    gNode = mainGroup.append('g').attr('class', 'nodes-layer');

    drawStars(currentW, currentH);
    buildLayout(currentW, currentH);
  }

  /* ---- Draw stars: fixed position, CSS twinkle only ---- */
  function drawStars(w, h) {
    if (gStars) gStars.selectAll('*').remove();
    const isDark = getTheme() === 'dark';
    const starCount = Math.floor((w * h) / 3500);
    for (let i = 0; i < starCount; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const r = Math.random() * 1.2 + 0.3;
      const opacity = Math.random() * 0.4 + 0.15;
      gStars.append('circle').attr('cx', cx).attr('cy', cy).attr('r', r)
        .classed('star', true).attr('opacity', isDark ? opacity : opacity * 0.5);
      const delay = (Math.random() * 5).toFixed(1);
      const dur = (2 + Math.random() * 3).toFixed(1);
      gStars.append('circle').attr('cx', cx).attr('cy', cy).attr('r', r)
        .classed('star', true).attr('opacity', isDark ? opacity * 0.6 : 0)
        .style('animation', `twinkle ${dur}s ${delay}s ease-in-out infinite`);
    }
  }

  /* ---- Compute balanced node positions ---- */
  function computePositions(filtered, w, h) {
    const count = filtered.length;
    const bnd = BOUNDARY;
    const ux = bnd.maxX - bnd.minX;
    const uy = bnd.maxY - bnd.minY;
    if (count <= 1) return [{ x: w / 2, y: h / 2 }];
    if (count === 2) return [
      { x: w * 0.33, y: h * 0.5 },
      { x: w * 0.67, y: h * 0.5 },
    ];
    if (count === 3) {
      const angles = [-Math.PI / 2, -Math.PI / 2 + (2 * Math.PI / 3), -Math.PI / 2 + (4 * Math.PI / 3)];
      return angles.map(a => ({
        x: w / 2 + Math.cos(a) * ux * 0.3,
        y: h / 2 + Math.sin(a) * uy * 0.3,
      }));
    }
    const result = [];
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 - Math.PI / 4;
      result.push({
        x: w / 2 + Math.cos(angle) * ux * 0.34,
        y: h / 2 + Math.sin(angle) * uy * 0.32,
      });
    }
    return result;
  }

  /* ---- Build SVG layout ---- */
  function buildLayout(w, h) {
    if (!filteredTools || !filteredTools.length) return;

    const positions = computePositions(filteredTools, w, h);
    nodePositions = filteredTools.map((t, i) => ({
      ...t,
      x: positions[i].x,
      y: positions[i].y,
    }));

    /* Links: connect same-category nodes */
    const links = [];
    for (let i = 0; i < nodePositions.length; i++) {
      for (let j = i + 1; j < nodePositions.length; j++) {
        if (nodePositions[i].category === nodePositions[j].category) {
          links.push({ source: nodePositions[i], target: nodePositions[j] });
        }
      }
    }

    /* --- Links: thin black solid --- */
    const linkSel = gLink.selectAll('.link-line').data(links).join('line')
      .attr('class', 'link-line')
      .attr('stroke', '#555')
      .attr('stroke-opacity', 0.4)
      .attr('stroke-width', 0.8);

    /* --- Particles along links --- */
    const particleData = links.map((l, i) => ({ link: l, idx: i, t: Math.random() }));
    const particleSel = gLink.selectAll('.link-particle').data(particleData).join('circle')
      .attr('class', 'link-particle')
      .attr('fill', '#635bff').attr('r', 2.5).attr('opacity', 0.7);

    /* --- Nodes --- */
    const nodeSel = gNode.selectAll('.node-group').data(nodePositions, d => d.name).join('g')
      .attr('class', 'node-group');

    nodeSel.append('circle').attr('r', NODE_R + 3).attr('fill', 'none')
      .attr('stroke', '#635bff').attr('stroke-width', 3).attr('opacity', 0.15);

    nodeSel.append('circle').attr('r', NODE_R).attr('class', 'node-circle')
      .attr('fill', 'url(#node-grad)').attr('stroke-width', 1.5);

    nodeSel.append('text')
      .attr('class', 'node-icon')
      .attr('dy', '0.35em').attr('text-anchor', 'middle')
      .attr('font-size', ICON_SIZE + 'px').text(d => d.icon);

    nodeSel.append('rect').attr('class', 'node-label-bg')
      .attr('x', -60).attr('y', NODE_R + 2).attr('width', 120).attr('height', 18).attr('rx', 4)
      .attr('fill', 'var(--label-bg)');
    nodeSel.append('text').attr('class', 'node-label')
      .attr('dy', NODE_R + 14)
      .style('font-weight', '500').style('letter-spacing', '-0.01em')
      .style('paint-order', 'stroke')
      .style('stroke', 'var(--label-stroke)').style('stroke-width', '3px')
      .text(d => d.name);

    nodeSel.filter(d => d.status === 'online')
      .append('circle').attr('class', 'status-dot')
      .attr('cx', NODE_R * 0.7).attr('cy', -NODE_R * 0.7).attr('r', 4).attr('fill', '#10b981')
      .attr('stroke', 'var(--bg)').attr('stroke-width', 2);

    /* ---- Interactions ---- */
    const tooltip = document.getElementById('tooltip');
    nodeSel.on('click', function (event, d) {
      event.stopPropagation();
      if (d.url) window.location.href = d.url;
    })
    .on('mouseenter', function (event, d) {
      const isDark = getTheme() === 'dark';
      let descHtml = `<div class="font-semibold mb-1 text-sm" style="color:${isDark ? '#fff' : '#1a1a2e'}">${esc(d.name)}</div>`;
      if (d.version) descHtml += `<div class="text-xs" style="color:${isDark ? '#9ca3af' : '#888'}">${esc(d.version)} · ${esc(d.type)}</div>`;
      descHtml += `<div class="text-xs mt-1 leading-relaxed" style="color:${isDark ? '#d1d5db' : '#555'}">${esc(d.description)}</div>`;
      descHtml += `<div class="mt-2 flex items-center gap-2"><span class="inline-block w-2 h-2 rounded-full ${d.status === 'online' ? 'bg-emerald-400' : 'bg-red-400'}"></span><span class="text-xs" style="color:${isDark ? '#9ca3af' : '#888'}">${d.status === 'online' ? 'Online' : 'Offline'}</span>`;
      if (d.downloadUrl) descHtml += ` <button class="ml-auto px-2.5 py-1 bg-primary rounded-lg text-xs text-white hover:bg-primaryLight transition cursor-pointer" data-dl="${esc(d.downloadUrl)}">下载</button>`;
      if (d.url) descHtml += ` <button class="px-2.5 py-1 border border-white/20 rounded-lg text-xs text-gray-300 hover:bg-white/10 transition cursor-pointer" data-open="${esc(d.url)}">打开</button>`;
      descHtml += '</div>';
      tooltip.innerHTML = descHtml;
      tooltip.classList.add('show');
      positionTooltip(event.clientX, event.clientY);
      tooltip.querySelectorAll('[data-dl]').forEach(btn => btn.addEventListener('click', () => window.handleDownload(btn.dataset.dl)));
      tooltip.querySelectorAll('[data-open]').forEach(btn => btn.addEventListener('click', () => { window.location.href = btn.dataset.open; }));
    })
    .on('mousemove', function (event) { positionTooltip(event.clientX, event.clientY); })
    .on('mouseleave', function () { tooltip.classList.remove('show'); });

    let draggingNode = false;
    nodeSel.call(d3.drag()
      .on('start', function () { draggingNode = true; })
      .on('drag', function (event) {
        const data = d3.select(this).datum();
        data.x = Math.max(BOUNDARY.minX, Math.min(BOUNDARY.maxX, event.x));
        data.y = Math.max(BOUNDARY.minY, Math.min(BOUNDARY.maxY, event.y));
        d3.select(this).attr('transform', `translate(${data.x},${data.y})`);
      })
      .on('end', function () {
        draggingNode = false;
        const data = d3.select(this).datum();
        data.originX = data.x;  // snap origin to current position so drift resumes smoothly
        data.originY = data.y;
      }));

    /* ---- Unified rAF loop ---- */
    const startTime = performance.now();
    function tick(now) {
      const t = now - startTime;

      /* 1) Node sinusoidal drift (soft ±4~8px, each node has unique period/phase) */
      if (!draggingNode) {
        nodePositions.forEach(n => {
          n.x = n.originX + Math.sin(t / n.periodX + n.phase) * n.ampX;
          n.y = n.originY + Math.cos(t / n.periodY + n.phase) * n.ampY;
        });
      }

      /* 2) Render transforms */
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);

      /* 3) Update link endpoints to follow nodes */
      linkSel
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

      /* 4) Particle flow along links */
      particleSel.each(function (d) {
        d.t += 0.006;
        if (d.t > 1) d.t -= 1;
        const s = d.link.source, tx = d.link.target;
        d3.select(this).attr('cx', s.x + (tx.x - s.x) * d.t)
                       .attr('cy', s.y + (tx.y - s.y) * d.t);
      });

      requestAnimationFrame(tick);
    }
    // Store origin positions for floating offset
    nodePositions.forEach(n => { n.originX = n.x; n.originY = n.y; });
    tick(performance.now());
  }

  /* ---- Position tooltip ---- */
  function positionTooltip(cx, cy) {
    const tip = document.getElementById('tooltip');
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let left = cx + 16, top = cy - 10;
    if (left + tw > window.innerWidth - 12) left = cx - tw - 16;
    if (top + th > window.innerHeight - 12) top = window.innerHeight - th - 12;
    if (top < 12) top = 12;
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }

  /* ---- Rebuild on filter change ---- */
  function rebuildCanvas() {
    svgEl?.selectAll('*').remove();
    svgEl = null;
    const wrap = document.getElementById('canvas-wrap');
    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (!w || !h) return;
    initCanvas();
  }

  /* ---- Resize handling ---- */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        const wrap = document.getElementById('canvas-wrap');
        const w = wrap.clientWidth, h = wrap.clientHeight;
        if (w && h && filteredTools.length) {
          const pad = Math.max(35, NODE_R + 7);
          BOUNDARY.minX = pad; BOUNDARY.maxX = w - pad;
          BOUNDARY.minY = pad; BOUNDARY.maxY = h - pad;
          svgEl?.selectAll('*').remove();
          svgEl = null;
          initCanvas();
        }
      }, 200);
  });

  /* ---- Twinkle CSS ---- */
  const styleEl = document.createElement('style');
  styleEl.textContent = `@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.55}}`;
  document.head.appendChild(styleEl);

  /* ================================================================
     INIT
     ================================================================ */
  // Categories are rendered immediately; tool nodes appear after tools.json loads
  renderCategories();
})();
</script>

<!-- Sync portal navbar theme with page theme -->
<script>
(function () {
  var btn = document.getElementById('portalThemeToggle');
  var icon = document.getElementById('portalThemeIcon');
  if (icon) {
    var t = document.documentElement.getAttribute('data-theme') || 'dark';
    icon.textContent = t === 'dark' ? '🌙' : '☀️';
  }
})();
</script>
